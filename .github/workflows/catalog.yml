name: Catalog

# Keeps the README catalog in sync with every app's meta.json, and blocks
# accidental Korean characters or committed API keys from landing.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Catalog is in sync with meta.json
        run: python3 scripts/generate_catalog.py --check

      - name: Authored content is English-only (no Korean)
        run: |
          # The authored surface (markdown docs/READMEs + catalog meta.json) is
          # English-only. Functional i18n data inside app source and model files
          # (a language's own endonym in a picker, tokenizer vocabularies, demo
          # strings) is allowed, so only *.md and meta.json are checked.
          MATCHES=$(git ls-files -z -- '*.md' '**/meta.json' \
            | xargs -0 grep -lIP '[\x{AC00}-\x{D7A3}\x{1100}-\x{11FF}\x{3130}-\x{318F}]' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Korean found in authored content (English-only):"
            echo "$MATCHES"
            exit 1
          fi
          echo "OK — authored content is English-only."

      - name: No leaked API keys
        run: |
          # Melange tokens look like dev_<hex> or ztp_<hex>. Catch them anywhere,
          # in any file and any context (xcschemes, comments, configs), not just
          # values assigned to a known key variable.
          if git grep -nIE '(dev|ztp)_[a-f0-9]{20,}'; then
            echo "::error::A Melange token literal was found above. Scrub it to a placeholder."
            exit 1
          fi
          # Also catch a real-looking value assigned to a key variable.
          if git grep -nIE '(tokenKey|personalKey|projectKey|MLANGE_PERSONAL_ACCESS_TOKEN)[^=:]*[=:][[:space:]]*"[A-Za-z0-9_-]{16,}"' \
              | grep -viE 'YOUR_PERSONAL_ACCESS_TOKEN|YOUR_MLANGE_KEY|YOUR_KEY|PLACEHOLDER'; then
            echo "::error::A value that looks like a real Melange key is assigned above. Use a placeholder."
            exit 1
          fi
          echo "OK, no leaked keys."
