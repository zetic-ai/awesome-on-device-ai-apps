name: CherryPad
options:
  bundleIdPrefix: ai.zetic.demo
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: SF5GDD3C2G
    CODE_SIGN_STYLE: Automatic

packages:
  ZeticMLange:
    url: https://github.com/zetic-ai/ZeticMLangeiOS.git
    exactVersion: 1.6.0

targets:
  # ---------- Container app (device; links the real on-device SDK) ----------
  # Hosts the full MangoPad-style UI and the warm ZeticMLangeLLMModel. Embeds the
  # keyboard extension into PlugIns/ via the CherryPadKeyboard target dependency.
  CherryPad:
    type: application
    platform: iOS
    sources:
      - path: CherryPad
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.zetic.demo.CherryPad
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CherryPad/Info.plist
        CODE_SIGN_ENTITLEMENTS: CherryPad/CherryPad.entitlements
    dependencies:
      - package: ZeticMLange
        product: ZeticMLange
      # ZeticMLange's static ggml CPU backend references BLAS/vDSP — link Accelerate.
      - sdk: Accelerate.framework
      # Auto-embeds the app-extension into the app's PlugIns/ directory.
      - target: CherryPadKeyboard

  # ---------- Keyboard extension (links NO SDK — ~60-120MB memory budget) ----------
  # Thin QWERTY + AI action bar. Captures text, writes it to the shared App Group,
  # and deep-links into the container app to run inference. Runs no model.
  CherryPadKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: CherryPadKeyboard
      - path: Shared
      # Inference code, shared with the app target so the keyboard can run the
      # model in-process (no app round-trip). LFM2.5-350M (~0.3GB) is the smallest
      # model, chosen to fit the extension's tight memory budget.
      - path: CherryPad/Services/ZeticConfig.swift
      - path: CherryPad/Services/Prompts.swift
      - path: CherryPad/Services/LLMOutput.swift
      - path: CherryPad/Services/LLMEngine.swift
      - path: CherryPad/Services/ZeticLLMEngine.swift
      - path: CherryPad/Services/StubLLMEngine.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.zetic.demo.CherryPad.Keyboard
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CherryPadKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: CherryPadKeyboard/CherryPadKeyboard.entitlements
    dependencies:
      - package: ZeticMLange
        product: ZeticMLange
      - sdk: Accelerate.framework

  # ---------- On-device model tests (runs the real Qwen model) ----------
  CherryPadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CherryPadTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.zetic.demo.CherryPad.Tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CherryPad
      - package: ZeticMLange
        product: ZeticMLange
      - sdk: Accelerate.framework

  # ---------- Simulator UI preview (no SDK; StubLLMEngine) ----------
  # The SDK 1.6.0 SPM package ships an arm64 device slice only, so linking it for a
  # Simulator destination fails. This package-free twin builds the SwiftUI app on the
  # Simulator; #if targetEnvironment(simulator) selects StubLLMEngine.
  CherryPadPreview:
    type: application
    platform: iOS
    sources:
      - path: CherryPad
        excludes:
          - CherryPadApp.swift          # PreviewApp supplies the @main
      - path: Shared
      # SDK-free keyboard UI, so the design harness can render the real views.
      - path: CherryPadKeyboard/KeyboardState.swift
      - path: CherryPadKeyboard/KeyboardView.swift
      - path: CherryPadKeyboard/KeyboardActionBar.swift
      - path: CherryPadPreview
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.zetic.demo.CherryPad.preview
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CherryPad/Info.plist

schemes:
  CherryPad:
    build:
      targets:
        CherryPad: all
    test:
      targets:
        - CherryPadTests
    run:
      config: Debug
  CherryPadPreview:
    build:
      targets:
        CherryPadPreview: all
    run:
      config: Debug
