name: Brew
options:
  bundleIdPrefix: com.brew
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  Brew:
    type: application
    platform: iOS
    sources:
      - path: Brew
    dependencies:
      # Vendored ZeticMLange xcframework. The upstream package ships a device
      # only slice, which breaks Simulator builds; this vendored copy adds an
      # empty Simulator slice so Xcode builds for both destinations. The binary
      # is a static framework, so it is linked (not embedded). On the Simulator
      # the app uses StubLLMEngine and references no symbols from it.
      - framework: Vendor/ZeticMLange.xcframework
        embed: false
      - sdk: Accelerate.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brew.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Brew/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: YES
