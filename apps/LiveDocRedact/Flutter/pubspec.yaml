name: livedocredact
description: "RedactLens — live on-device document PII redaction (ZETIC Melange)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # Pinned exactly: the PyroGuard-verified SDK surface (GATE-2 ruling). Do not float.
  zetic_mlange: 1.8.1
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.9.1 # used by tool/generate_icon.dart only

flutter:
  uses-material-design: true
  assets:
    - assets/en_dict.txt

# Launcher icon: domain-identifying document+redaction glyph, generated by
# tool/generate_icon.dart into assets/icon/app_icon.png (1024x1024).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
