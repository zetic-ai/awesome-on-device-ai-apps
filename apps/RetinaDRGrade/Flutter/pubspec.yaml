name: retinadrgrade
description: "GradeVue — on-device diabetic-retinopathy severity grading (RetinaDRGrade)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ZETIC Melange on-device inference SDK (Flutter FFI).
  zetic_mlange: ^1.8.1

  # Image decode + EXIF orientation + resize (pure Dart).
  image: ^4.9.1

  # Photo-library upload of a fundus image (the only user input path).
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Generates the custom launcher icon for iOS + Android.
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# Custom domain-identifying launcher icon (fundus / severity-gradient glyph).
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
